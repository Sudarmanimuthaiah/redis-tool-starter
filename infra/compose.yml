services:
  redis-node-1: &redis-node
    build:
      context: .
      dockerfile: Containerfile
    container_name: redis-node-1
    networks:
      redis-net:
        ipv4_address: 10.10.0.11
    volumes:
      - ./id_rsa.pub:/root/.ssh/authorized_keys:ro

  redis-node-2:
    <<: *redis-node
    container_name: redis-node-2

    networks:
      redis-net:
        ipv4_address: 10.10.0.12

  redis-node-3:
    <<: *redis-node
    container_name: redis-node-3
    networks:
      redis-net:
        ipv4_address: 10.10.0.13

  redis-node-4:
    <<: *redis-node
    container_name: redis-node-4
    networks:
      redis-net:
        ipv4_address: 10.10.0.14

  redis-node-5:
    <<: *redis-node
    container_name: redis-node-5
    networks:
      redis-net:
        ipv4_address: 10.10.0.15

  redis-node-6:
    <<: *redis-node
    container_name: redis-node-6
    networks:
      redis-net:
        ipv4_address: 10.10.0.16

networks:
  redis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
