---
- hosts: redis_nodes
  become: true
  vars:
    redis_version: "{{ redis_version | default('7.0.15') }}"
  roles:
    - redis

- hosts: redis-node-1
  become: true
  tasks:
    - name: Check if cluster is already formed
      shell: redis-cli cluster info | grep cluster_state:ok
      register: cluster_check
      failed_when: false
      changed_when: false

    - name: Form Redis Cluster
      shell: |
        redis-cli --cluster create \
        10.10.0.11:6379 10.10.0.12:6379 10.10.0.13:6379 \
        10.10.0.14:6379 10.10.0.15:6379 10.10.0.16:6379 \
        --cluster-replicas {{ replicas_per_master | default(1) }} \
        --cluster-yes
      when: cluster_check.rc != 0

    - name: Print cluster topology
      shell: redis-cli cluster nodes
      register: cluster_nodes

    - debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
